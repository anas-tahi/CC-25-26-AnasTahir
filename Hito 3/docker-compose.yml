version: "3.9"
services:
  mongo:
    image: mongo:7
    container_name: mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    restart: unless-stopped

  auth-service:
    build:
      context: ./backend/auth-service
      dockerfile: Dockerfile
    ports:
      - "4000:4000"
    volumes:
      - ./backend/auth-service:/app
    restart: unless-stopped

  product-service:
    build:
      context: ./backend/product-service
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    volumes:
      - ./backend/product-service:/app
    restart: unless-stopped

  comment-service:
    build:
      context: ./backend/comment-service
      dockerfile: Dockerfile
    ports:
      - "6060:6000"  # ✅ Changed host port to safe browser port
    volumes:
      - ./backend/comment-service:/app
    restart: unless-stopped
    env_file:
      - ./backend/comment-service/.env
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    restart: unless-stopped
    environment:
      BROWSER: chrome

volumes:
  mongo-data:
